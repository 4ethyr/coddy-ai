name: Release Linux

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    name: Linux bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/coddy-electron/package-lock.json

      - name: Install system packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-0 \
            libnotify4 \
            libnss3 \
            libxss1 \
            libxtst6 \
            libatspi2.0-0 \
            libuuid1 \
            xdg-utils

      - name: Install frontend dependencies
        working-directory: apps/coddy-electron
        run: npm ci

      - name: Test Rust workspace
        run: cargo test -p coddy -p coddy-agent -p coddy-runtime -p coddy-ipc

      - name: Test Electron frontend
        working-directory: apps/coddy-electron
        run: |
          npm test
          npm run test:e2e
          npm run typecheck
          npm run typecheck:main

      - name: Test local installer contract
        run: ./scripts/test_install_local.sh

      - name: Build release bundle
        run: ./scripts/package_linux.sh

      - name: Upload packaged bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: coddy-linux
          path: |
            dist/coddy-linux-*.tar.gz
            dist/coddy-linux-*.tar.gz.sha256

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/coddy-linux-*.tar.gz
            dist/coddy-linux-*.tar.gz.sha256
