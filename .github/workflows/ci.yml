name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/coddy-electron/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/coddy-electron
        run: npm ci

      - name: Guard against committed secrets
        run: |
          ./scripts/guard_no_secrets.sh
          ./scripts/test_guard_no_secrets.sh
          ./scripts/test_live_project_battery_summary.sh
          ./scripts/test_patch_task_battery_apply_recount.sh

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Lint Rust workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test Rust workspace
        run: cargo test --workspace

      - name: Audit frontend dependencies
        working-directory: apps/coddy-electron
        run: npm audit --audit-level=high

      - name: Validate Electron frontend
        working-directory: apps/coddy-electron
        run: |
          npm run typecheck
          npm run typecheck:main
          npm run lint
          npm test
          npm run test:e2e
          npm run build
